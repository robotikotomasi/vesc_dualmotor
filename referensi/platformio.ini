;
; PlatformIO Configuration — Hoverboard ESC Dual Motor Controller
; STM32F103RCT6, FOC + VESC + FreeRTOS CMSIS-RTOS v2
;

[env:hoverboard_esc]
platform = ststm32
board = genericSTM32F103RC
framework = cmsis

board_build.ldscript = $PROJECT_DIR/STM32F103RCTX_FLASH.ld

build_flags =
    -DSTM32F103xE
    -DUSE_HAL_DRIVER
    -DHOVERBOARD_DUAL_MOTOR
    -I$PROJECT_DIR/Inc
    -I$PROJECT_DIR/Src
    -I$PROJECT_DIR/library/STM32F1xx_HAL_Driver/Inc
    -I$PROJECT_DIR/library/STM32F1xx_HAL_Driver/Inc/Legacy
    -I$PROJECT_DIR/library/FreeRTOS/Source/include
    -I$PROJECT_DIR/library/FreeRTOS/Source/portable/GCC/ARM_CM3
    -I$PROJECT_DIR/library/FreeRTOS/Source/CMSIS_RTOS_V2
    -I$PROJECT_DIR/library/CMSIS/Core/Include
    -I$PROJECT_DIR/library/CMSIS/Device/ST/STM32F1xx/Include
    -Os
    -Wall
    -Wno-unused-parameter
    -Wno-missing-field-initializers
    -Wno-unused-function
    -Wno-unused-variable
    -Wno-discarded-qualifiers
    -Wno-sign-compare
    -fdata-sections
    -ffunction-sections

extra_scripts = pre:extra_script.py

lib_ldf_mode = off
lib_compat_mode = off
