;
; PlatformIO Configuration — Hoverboard ESC Dual Motor Controller
; STM32F103RCT6, VESC + FreeRTOS CMSIS-RTOS v2
;

[env:hoverboard_esc]
platform = ststm32
board = genericSTM32F103RC
framework = cmsis

board_build.ldscript = $PROJECT_DIR/STM32F103RCTX_FLASH.ld

build_flags =
    -DSTM32F103xE
    -DUSE_HAL_DRIVER
    -DHOVERBOARD_DUAL_MOTOR
    -DHW_HAS_DUAL_MOTORS
    -DHW_HEADER="hw_hoverboard.h"
    -DCOMM_USE_USB=0
    -DCAN_ENABLE=0
    -DAPPCONF_CONTROLLER_ID=0
    -I$PROJECT_DIR/compat
    -I$PROJECT_DIR/Inc
    -I$PROJECT_DIR/Src
    -I$PROJECT_DIR/Src/hwconf
    -I$PROJECT_DIR/Src/motor
    -I$PROJECT_DIR/Src/comm
    -I$PROJECT_DIR/Src/driver
    -I$PROJECT_DIR/Src/driver/nrf
    -I$PROJECT_DIR/Src/driver/lora
    -I$PROJECT_DIR/Src/encoder
    -I$PROJECT_DIR/Src/imu
    -I$PROJECT_DIR/Src/imu/BMI160_driver
    -I$PROJECT_DIR/Src/imu/Fusion
    -I$PROJECT_DIR/Src/util
    -I$PROJECT_DIR/Src/util/lzo
    -I$PROJECT_DIR/Src/applications
    -I$PROJECT_DIR/Src/libcanard
    -I$PROJECT_DIR/Src/libcanard/dsdl/vesc
    -I$PROJECT_DIR/Src/qmlui
    -I$PROJECT_DIR/Src/qmlui/app
    -I$PROJECT_DIR/Src/qmlui/hw
    -I$PROJECT_DIR/lib/STM32F1xx_HAL_Driver/Inc
    -I$PROJECT_DIR/lib/STM32F1xx_HAL_Driver/Inc/Legacy
    -I$PROJECT_DIR/lib/FreeRTOS/Source/include
    -I$PROJECT_DIR/lib/FreeRTOS/Source/portable/GCC/ARM_CM3
    -I$PROJECT_DIR/lib/FreeRTOS/Source/CMSIS_RTOS_V2
    -I$PROJECT_DIR/lib/CMSIS/Core/Include
    -I$PROJECT_DIR/lib/CMSIS/Device/ST/STM32F1xx/Include
    -Os
    -Wall
    -Wno-unused-parameter
    -Wno-missing-field-initializers
    -Wno-unused-function
    -Wno-unused-variable
    -Wno-discarded-qualifiers
    -Wno-sign-compare
    -Wno-implicit-function-declaration
    -Wno-pointer-sign
    -Wno-incompatible-pointer-types
    -Wno-int-conversion
    -Wno-format
    -Wno-unused-but-set-variable
    -Wno-maybe-uninitialized
    -Wno-type-limits
    -Wno-old-style-declaration
    -fdata-sections
    -ffunction-sections

extra_scripts = pre:extra_script.py

lib_ldf_mode = off
lib_compat_mode = off
