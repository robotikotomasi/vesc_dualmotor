; ── Include paths ─────────────────────────────────────────────────────────
build_flags =
    ; Optimisation & language standard (from fw.mk USE_OPT)
    -O2 -ggdb
    -fomit-frame-pointer
    -falign-functions=16
    -std=gnu99
    -D_GNU_SOURCE
    -DBOARD_OTG_NOVBUSSENS
    ; FloatMath
    -fsingle-precision-constant
    -Wdouble-promotion
    ; LispBM feature flags
    -DUSE_LISPBM
    -DLBM_USE_DYN_FUNS
    -DLBM_USE_DYN_MACROS
    -DLBM_USE_DYN_LOOPS
    -DLBM_USE_TIME_QUOTA
    -DLBM_USE_ERROR_LINENO
    ; StdPeriph
    -DUSE_STDPERIPH_DRIVER
    ; CPU / FPU (Cortex-M4 hard-float)
    -mcpu=cortex-m4
    -mthumb
    -DTHUMB
    -mfpu=fpv4-sp-d16
    -mfloat-abi=hard
    ; Git metadata fallbacks (force-include so every TU sees GIT_COMMIT_HASH etc.)
    -include Inc/firmware_metadata.h
    ; Linker
    -lm
    -specs=nosys.specs
    -Wl,--gc-sections
    ; Stack sizes (ChibiOS rules.mk uses USE_EXCEPTIONS_STACKSIZE=0x800/USE_PROCESS_STACKSIZE=0x800)
    -Wl,--defsym=__main_stack_size__=0x800
    -Wl,--defsym=__process_stack_size__=0x800
    ; ── Project root (ld script, .gdbinit, make/) ─────────────────────
    -I.
    ; ── Application headers (moved to Inc/) ───────────────────────────
    -IInc
    ; ── Cross-subsystem shortcut: -Ilib lets #include "motor/x.h" work
    -Ilib
    ; ── ChibiOS startup ────────────────────────────────────────────────
    -Ilib/ChibiOS_3.0.5/os/common/ports/ARMCMx/devices/STM32F4xx
    -Ilib/ChibiOS_3.0.5/os/ext/CMSIS/include
    -Ilib/ChibiOS_3.0.5/os/ext/CMSIS/ST
    ; ── ChibiOS RT kernel + port ───────────────────────────────────────
    -Ilib/ChibiOS_3.0.5/os/rt/include
    -Ilib/ChibiOS_3.0.5/os/rt/ports/ARMCMx
    -Ilib/ChibiOS_3.0.5/os/rt/ports/ARMCMx/compilers/GCC
    ; ── ChibiOS HAL ────────────────────────────────────────────────────
    -Ilib/ChibiOS_3.0.5/os/hal/include
    -Ilib/ChibiOS_3.0.5/os/hal/osal/rt
    -Ilib/ChibiOS_3.0.5/os/hal/ports/common/ARMCMx
    -Ilib/ChibiOS_3.0.5/os/hal/ports/STM32/STM32F4xx
    -Ilib/ChibiOS_3.0.5/os/hal/ports/STM32/LLD
    -Ilib/ChibiOS_3.0.5/os/hal/ports/STM32/LLD/DACv1
