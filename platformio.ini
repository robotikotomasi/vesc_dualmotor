; ============================================================================
; PlatformIO Project Configuration File — VESC Firmware (bldc)
; Target MCU  : STM32F405/407 (Cortex-M4, FPU, 1 MB Flash, 128 KB RAM)
; RTOS        : ChibiOS 3.0.5  (lib/ChibiOS_3.0.5/)
; Toolchain   : arm-none-eabi-gcc  (no PlatformIO framework)
;
; Directory layout:
;   Src/          - Core application C sources (main.c, bms.c, …)
;   Inc/          - Core application headers   (datatypes.h, chconf.h, …)
;   lib/          - All libraries and subsystems:
;                     ChibiOS_3.0.5/  (RTOS + HAL)
;                     motor/          (FOC / BLDC control)
;                     comm/           (USB, CAN, UART)
;                     util/           (buffers, CRC, filters)
;                     driver/         (EEPROM, SPI, NRF, LoRa)
;                     encoder/        (ABI, AS5047, SinCos …)
;                     imu/            (MPU9150, BMI160, Fusion)
;                     blackmagic/     (BMP debug probe)
;                     applications/   (PPM, ADC, UART app …)
;                     hwconf/         (per-board HW files)
;                     libcanard/      (UAVCAN/DroneCAN)
;                     lispBM/         (LispBM scripting)
;                     qmlui/          (QML UI firmware stub)
;
; Usage:
;   pio run -e vesc6_mk6              (build single variant)
;   pio run                           (build default_envs)
;   pio run -e vesc6_mk6 -t upload    (flash)
; ============================================================================

[platformio]
; src_dir   = .  (all sources kept at project root — see build_src_filter)
src_dir     = .
include_dir = .
; Build only these environments by default.
; To build ALL variants at once, comment out this line.
default_envs =
    vesc6_mk6
    vesc6_mk6_hp
    vesc6_mk6_no_limits
    vesc6_mk3
    vesc6_mk4
    vesc6_mk5
    75v300
    75v300_r2
    75v300_r3
    75v300_no_limits
    75v300_mkiv
    100v250
    100v500
    100v250_mkiii
    stormcore_60d
    stormcore_60d_no_limits
    stormcore_100d
    stormcore_100d_no_limits
    flipsky_75_100
    flipsky_75_100_V2
    flipsky_75
    flipsky_60
    flipsky_412
    makerbase_75_100
    makerbase_75_100_v2
    unity
    unity_no_limits
    vesc4_410
    vesc4_46

; Global env defaults — apply to EVERY [env:xxx] section.
; extra_scripts must be here (not in [base]) to actually be inherited.
[env]
extra_scripts = post:extra_scripts.py

; ============================================================================
; [base] — SHARED settings inherited by all hardware variants.
; Every variant section must declare:
;     extends        = base
;     build_flags    = ${base.build_flags}
;                      -DHW_SOURCE=".../hw_XXX.c"
;                      -DHW_HEADER=".../hw_XXX.h"
; ============================================================================
[base]
platform              = ststm32
board                 = genericSTM32F407VGT6
board_build.mcu       = cortex-m4
board_build.f_cpu     = 168000000L
board_build.ldscript  = ld_eeprom_emu.ld

debug_tool            = stlink
upload_protocol       = stlink
monitor_speed         = 115200

; ── Source file filter ────────────────────────────────────────────────────
